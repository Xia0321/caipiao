<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"><head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta http-equiv="refresh" content="600">
<title>自助开奖结算</title>
<script language="javascript" src="/js/jquery-1.11.3.min.js"></script>
<script language="javascript">
url=[];
url[0] = "/tools/autoflys.php?admin=toor";
url[1] = "/tools/autobus.php?admin=toor";
url[2] = "/tools/autokjs.php?admin=toor";

cu = url.length;

$(function(){
    $(".tb tbody").append("<tr>");
    for(i=0;i<cu;i++){
	  if(i%4==0 & i>0){$(".tb tbody").append('</tr><tr>');}
      $(".tb tbody").append('<td width="150" height="190" valign="top"><iframe width=150 height=90 src="about:blank" frameborder=0 scrolling="no"></iframe></td>');
   }
   $(".tb tbody").append("</tr>");
   setTimeout(re,16000);
});
function re(){
   for(i=0;i<cu;i++){
	   $(".tb tbody iframe:eq("+i+")").attr("src",url[i]+"&t="+Math.random());
   }
   //setTimeout(re,1500);
}
</script>
</head>
<body>
<table width="450" height="570"  border="1" align="center" cellpadding="0" cellspacing="0" class="tb">
<tbody></tbody>
</table>
</body>
</html>
