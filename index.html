<script type="text/javascript">
    $(function() {
        $('.speeds').each(function() {
           var $this = $(this);
           var begin = 0;

           var request = $.ajax({
               url: $this.data('url'),
               timeout: 15000,
               type: 'get',
               beforeSend: function(r) {
                   begin = new Date();
               },
               success: function(data) {
                   var end = new Date();
                   var duration = parseInt((end - begin) / 1000);
                   if (duration < 3) {
                       $this.text('速度极快！');
                   } else {
                       $this.text(duration + '秒')
                   }
               },
               complete: function(r, status) {
                   if (status == 'timeout') {
                        request.abort();
                        $this.text('访问超时！');
                   } else if (status == 'error') {
                        var end = new Date();
                        var duration = parseInt((end - begin) / 1000);
                        if (duration < 3) {
                            $this.text('速度极快！');
                        } else {
                            $this.text(duration + '秒')
                        }
                   }
               }
           });
        });
    });
</script>
