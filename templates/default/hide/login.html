<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>控制中心</title>
<style type="text/css">
* { box-sizing: border-box; margin: 0; padding: 0; }
body { min-height: 100vh; font-family: "Microsoft YaHei","PingFang SC",-apple-system,sans-serif; background: #0b0f19; color: #e2e8f0; overflow-x: hidden; }
body::before { content: ""; position: fixed; inset: 0; background: radial-gradient(ellipse at 30% 20%, rgba(0,212,255,.06) 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, rgba(59,130,246,.04) 0%, transparent 50%); pointer-events: none; z-index: 0; }
.grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,212,255,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,.04) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; z-index: 0; }
@keyframes floatIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes glowPulse { 0%,100% { box-shadow: 0 8px 32px rgba(0,0,0,.4), 0 0 0 1px rgba(0,212,255,.08) inset; } 50% { box-shadow: 0 8px 40px rgba(0,0,0,.5), 0 0 0 1px rgba(0,212,255,.15) inset, 0 0 30px rgba(0,212,255,.05); } }
.wrap { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.logo-line { text-align: center; margin-bottom: 36px; animation: floatIn .6s ease-out; }
.logo-line .title { font-size: 26px; font-weight: 700; letter-spacing: 8px; color: #00d4ff; text-shadow: 0 0 24px rgba(0,212,255,.4), 0 0 48px rgba(0,212,255,.15); }
.logo-line .sub { font-size: 12px; color: rgba(148,163,184,.6); letter-spacing: 3px; margin-top: 10px; text-transform: uppercase; }
.card { width: 100%; max-width: 380px; background: rgba(17,24,39,.9); border: 1px solid rgba(0,212,255,.2); border-radius: 16px; padding: 40px 36px; animation: floatIn .8s ease-out, glowPulse 4s ease-in-out infinite; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
.card-head { text-align: center; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid rgba(30,58,95,.6); }
.card-head h1 { font-size: 20px; font-weight: 600; color: #00d4ff; letter-spacing: 4px; }
.card-head p { margin: 8px 0 0; font-size: 12px; color: rgba(148,163,184,.5); }
.form-row { margin-bottom: 20px; }
.form-row label { display: block; font-size: 12px; color: rgba(148,163,184,.7); margin-bottom: 8px; letter-spacing: 1px; }
.form-row input[type="text"], .form-row input[type="password"] { width: 100%; height: 46px; padding: 0 16px; font-size: 14px; color: #e2e8f0; background: rgba(11,15,25,.8); border: 1px solid rgba(30,58,95,.8); border-radius: 10px; outline: none; transition: all .25s; }
.form-row input::placeholder { color: rgba(148,163,184,.35); }
.form-row input:focus { border-color: #00d4ff; box-shadow: 0 0 0 3px rgba(0,212,255,.12); background: rgba(11,15,25,.95); }
.form-row.code-row { display: flex; gap: 12px; align-items: flex-end; }
.form-row.code-row > div { flex: 1; }
.form-row.code-row img { height: 46px; border-radius: 10px; cursor: pointer; border: 1px solid rgba(30,58,95,.8); vertical-align: bottom; transition: all .2s; }
.form-row.code-row img:hover { border-color: #00d4ff; }
.info.facode { display: none; }
.btn-submit { width: 100%; height: 48px; margin-top: 28px; font-size: 15px; font-weight: 700; letter-spacing: 5px; color: #0b0f19; background: linear-gradient(180deg, #00d4ff 0%, #0099b0 100%); border: none; border-radius: 10px; cursor: pointer; transition: all .25s; position: relative; overflow: hidden; }
.btn-submit:hover { box-shadow: 0 4px 24px rgba(0,212,255,.35); transform: translateY(-1px); }
.btn-submit:active { transform: translateY(0); }
.fl { float: left; }
.fr { float: right; }
.form_t { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
.form_t .user_t { font-size: 16px; color: #00d4ff; font-weight: 600; letter-spacing: 2px; }
.form_t .user_f { cursor: pointer; font-size: 12px; color: rgba(148,163,184,.5); transition: color .2s; }
.form_t .user_f:hover { color: #00d4ff; }
</style>
<script src="/js/jquery-1.8.3.js"></script>
<script src="/js/md5.js"></script>
<script>
$(function(){
	$("#imgcode").on("click", function(){ $(this).attr("src", "/imgcode.php?act=init&" + Math.random()); });
	$("input:password").on("focus", function(){ $(this).attr("placeholder",""); });
	$("#password").on("blur", function(){
		if($(this).val()==='') $(this).attr("placeholder", $(this).attr("title"));
		else $("#pass").val(men_md5_password($("#password").val()));
	});
	$("input:text").on("focus", function(){ $(this).attr("placeholder",""); });
	$("input:text").on("blur", function(){ if($(this).val()==='') $(this).attr("placeholder", $(this).attr("title")); });
	$(".user_f").on("click", function(){ $(".info.facode").slideToggle(); });
	$("#username").focus();
});
function checkform(){
	if(!$("#username").val()){ alert("请输入账号"); $("#username").focus(); return false; }
	if(!$("#password").val()){ alert("请输入密码"); $("#password").focus(); return false; }
	if(!$("#code").val()){ alert("请输入验证码"); $("#code").focus(); return false; }
	return true;
}
</script>
</head>
<body>
<div class="grid-bg"></div>
<div class="wrap">
	<div class="logo-line">
		<div class="title">控制中心</div>
		<div class="sub">管理后台入口</div>
	</div>
	<div class="card">
		<div class="card-head">
			<h1>管理员登录</h1>
			<p>请使用您的账号与验证码登录</p>
		</div>
		<form method="post" id="form" name="form" onsubmit="return checkform();">
			<input type="hidden" name="xtype" value="login" />
			<input type="hidden" name="pass" id="pass" value="" />
			<div class="form_t">
				<span class="fl user_t">账号登录</span>
				<span class="fr user_f"></span>
			</div>
			<div class="form-row info username">
				<label>账号</label>
				<input type="text" name="username" id="username" placeholder="请输入您的账号" title="请输入您的账号" autocomplete="off">
			</div>
			<div class="form-row info password">
				<label>密码</label>
				<input type="password" name="password" id="password" placeholder="您的密码" title="您的密码">
			</div>
			<div class="form-row info code code-row">
				<div style="flex:1;">
					<label>验证码</label>
					<input type="text" name="code" id="code" placeholder="验证码" title="验证码" autocomplete="off">
				</div>
				<img src="/imgcode.php?act=init" alt="" id="imgcode" title="看不清？点击更换">
			</div>
			<div class="info facode form-row">
				<label>二次验证</label>
				<input type="text" name="facode" placeholder="二次验证码" maxlength="10" autocomplete="off">
			</div>
			<button type="submit" class="btn-submit">登 录</button>
		</form>
	</div>
</div>
</body>
</html>
