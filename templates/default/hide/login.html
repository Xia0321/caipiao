<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>控制中心</title>
<style type="text/css">
* { box-sizing: border-box; }
body { margin: 0; padding: 0; min-height: 100vh; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #0a0e1a; color: #e0e6ed; overflow-x: hidden; }
body::before { content: ""; position: fixed; inset: 0; background: linear-gradient(135deg, rgba(0,40,80,.15) 0%, transparent 50%, rgba(0,80,120,.08) 100%); pointer-events: none; z-index: 0; }
.grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,180,220,.06) 1px, transparent 1px), linear-gradient(90deg, rgba(0,180,220,.06) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
.wrap { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
.logo-line { text-align: center; margin-bottom: 32px; }
.logo-line .title { font-size: 22px; font-weight: 600; letter-spacing: 6px; color: #00c8dc; text-shadow: 0 0 20px rgba(0,200,220,.4); }
.logo-line .sub { font-size: 12px; color: rgba(224,230,237,.5); letter-spacing: 2px; margin-top: 8px; }
.card { width: 100%; max-width: 360px; background: rgba(12,20,40,.85); border: 1px solid rgba(0,200,220,.25); border-radius: 12px; padding: 36px 32px; box-shadow: 0 8px 32px rgba(0,0,0,.4), 0 0 0 1px rgba(0,200,220,.1) inset; }
.card-head { text-align: center; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid rgba(0,200,220,.2); }
.card-head h1 { margin: 0; font-size: 18px; font-weight: 600; color: #00c8dc; letter-spacing: 3px; }
.card-head p { margin: 6px 0 0; font-size: 12px; color: rgba(224,230,237,.5); }
.form-row { margin-bottom: 18px; }
.form-row label { display: block; font-size: 12px; color: rgba(224,230,237,.7); margin-bottom: 6px; }
.form-row input[type="text"], .form-row input[type="password"] { width: 100%; height: 44px; padding: 0 14px; font-size: 14px; color: #e0e6ed; background: rgba(0,20,40,.6); border: 1px solid rgba(0,200,220,.3); border-radius: 8px; outline: none; transition: border-color .2s; }
.form-row input::placeholder { color: rgba(224,230,237,.35); }
.form-row input:focus { border-color: #00c8dc; box-shadow: 0 0 0 2px rgba(0,200,220,.2); }
.form-row.code-row { display: flex; gap: 10px; align-items: center; }
.form-row.code-row input { flex: 1; }
.form-row.code-row img { height: 44px; border-radius: 8px; cursor: pointer; border: 1px solid rgba(0,200,220,.3); vertical-align: middle; }
.info.facode { display: none; }
.btn-submit { width: 100%; height: 44px; margin-top: 24px; font-size: 15px; font-weight: 600; letter-spacing: 4px; color: #0a0e1a; background: linear-gradient(180deg, #00c8dc 0%, #0099b0 100%); border: none; border-radius: 8px; cursor: pointer; transition: opacity .2s, box-shadow .2s; }
.btn-submit:hover { opacity: .95; box-shadow: 0 4px 20px rgba(0,200,220,.4); }
.fl { float: left; }
.fr { float: right; }
.form_t { margin-bottom: 20px; }
.form_t .user_t { font-size: 16px; color: #00c8dc; }
.form_t .user_f { cursor: pointer; font-size: 12px; color: rgba(224,230,237,.5); }
</style>
<script src="/js/jquery-1.8.3.js"></script>
<script src="/js/md5.js"></script>
<script>
$(function(){
	$("#imgcode").on("click", function(){ $(this).attr("src", "/imgcode.php?act=init&" + Math.random()); });
	$("input:password").on("focus", function(){ $(this).attr("placeholder",""); });
	$("#password").on("blur", function(){
		if($(this).val()==='') $(this).attr("placeholder", $(this).attr("title"));
		else $("#pass").val(men_md5_password($("#password").val()));
	});
	$("input:text").on("focus", function(){ $(this).attr("placeholder",""); });
	$("input:text").on("blur", function(){ if($(this).val()==='') $(this).attr("placeholder", $(this).attr("title")); });
	$(".user_f").on("click", function(){ $(".info.facode").slideToggle(); });
	$("#username").focus();
});
function checkform(){
	if(!$("#username").val()){ alert("请输入账号"); $("#username").focus(); return false; }
	if(!$("#password").val()){ alert("请输入密码"); $("#password").focus(); return false; }
	if(!$("#code").val()){ alert("请输入验证码"); $("#code").focus(); return false; }
	return true;
}
</script>
</head>
<body>
<div class="grid-bg"></div>
<div class="wrap">
	<div class="logo-line">
		<div class="title">控制中心</div>
		<div class="sub">管理后台入口</div>
	</div>
	<div class="card">
		<div class="card-head">
			<h1>管理员登录</h1>
			<p>请使用您的账号与验证码登录</p>
		</div>
		<form method="post" id="form" name="form" onsubmit="return checkform();">
			<input type="hidden" name="xtype" value="login" />
			<input type="hidden" name="pass" id="pass" value="" />
			<div class="form_t">
				<span class="fl user_t">账号登录</span>
				<span class="fr user_f"></span>
			</div>
			<div class="form-row info username">
				<label>账号</label>
				<input type="text" name="username" id="username" placeholder="请输入您的账号" title="请输入您的账号" autocomplete="off">
			</div>
			<div class="form-row info password">
				<label>密码</label>
				<input type="password" name="password" id="password" placeholder="您的密码" title="您的密码">
			</div>
			<div class="form-row info code code-row">
				<div style="flex:1;">
					<label>验证码</label>
					<input type="text" name="code" id="code" placeholder="验证码" title="验证码" autocomplete="off">
				</div>
				<img src="/imgcode.php?act=init" alt="" id="imgcode" title="看不清？点击更换">
			</div>
			<div class="info facode form-row">
				<label>二次验证</label>
				<input type="text" name="facode" placeholder="二次验证码" maxlength="10" autocomplete="off">
			</div>
			<button type="submit" class="btn-submit">登 录</button>
		</form>
	</div>
</div>
</body>
</html>
