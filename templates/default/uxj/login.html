<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>电脑端入口</title>
<style type="text/css">
* { box-sizing: border-box; }
body { margin: 0; padding: 0; min-height: 100vh; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: linear-gradient(145deg, #1a1f35 0%, #252b48 40%, #1e2439 100%); color: #e8eaef; overflow-x: hidden; }
.bg-shine { position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(255,200,80,.12) 0%, transparent 50%); pointer-events: none; z-index: 0; }
.wrap { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
.main { display: flex; align-items: center; justify-content: center; gap: 48px; flex-wrap: wrap; }
.card { width: 100%; max-width: 380px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); border-radius: 16px; padding: 40px 36px; backdrop-filter: blur(12px); box-shadow: 0 16px 48px rgba(0,0,0,.25); }
.card-title { text-align: center; margin-bottom: 28px; }
.card-title .tit { font-size: 20px; font-weight: 600; letter-spacing: 4px; color: #ffc850; }
.card-title .desc { font-size: 12px; color: rgba(232,234,239,.6); margin-top: 6px; }
.form-g { margin-bottom: 18px; }
.form-g label { display: block; font-size: 12px; color: rgba(232,234,239,.75); margin-bottom: 6px; }
.form-g input[type="text"], .form-g input[type="password"] { width: 100%; height: 46px; padding: 0 16px; font-size: 14px; color: #e8eaef; background: rgba(0,0,0,.2); border: 1px solid rgba(255,255,255,.15); border-radius: 10px; outline: none; transition: border-color .2s, box-shadow .2s; }
.form-g input::placeholder { color: rgba(232,234,239,.4); }
.form-g input:focus { border-color: rgba(255,200,80,.5); box-shadow: 0 0 0 2px rgba(255,200,80,.15); }
.code-wrap { display: flex; gap: 10px; align-items: flex-end; }
.code-wrap .form-g { flex: 1; }
.code-wrap img { height: 46px; border-radius: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,.15); }
.info.facode { display: none; }
.btn-login { width: 100%; height: 46px; margin-top: 26px; font-size: 15px; font-weight: 600; letter-spacing: 4px; color: #1a1f35; background: linear-gradient(180deg, #ffc850 0%, #e6a820 100%); border: none; border-radius: 10px; cursor: pointer; transition: opacity .2s, box-shadow .2s; }
.btn-login:hover { opacity: .95; box-shadow: 0 6px 24px rgba(255,200,80,.35); }
.side { width: 120px; text-align: center; }
.side .qrcode-box { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 12px; }
.side .qrcode-box img { width: 96px; height: 96px; display: block; background: #fff; border-radius: 6px; }
.side .qrcode-box .txt { font-size: 11px; color: rgba(232,234,239,.6); margin-top: 8px; line-height: 1.4; }
.form_t { margin-bottom: 18px; }
.form_t .user_t { font-size: 15px; color: #ffc850; }
.form_t .user_f { cursor: pointer; font-size: 12px; color: rgba(232,234,239,.5); }
.fl { float: left; }
.fr { float: right; }
</style>
<script src="/js/jquery-1.8.3.js"></script>
<script src="/js/md5.js"></script>
<script>
$(function(){
	$("#imgcode").on("click", function(){ $(this).attr("src", "/imgcode.php?act=init&" + Math.random()); });
	$("input:password").on("focus", function(){ $(this).attr("placeholder",""); });
	$("#password").on("blur", function(){
		if($(this).val()==='') $(this).attr("placeholder", $(this).attr("title"));
		else $("#pass").val(men_md5_password($("#password").val()));
	});
	$("input:text").on("focus", function(){ $(this).attr("placeholder",""); });
	$("input:text").on("blur", function(){ if($(this).val()==='') $(this).attr("placeholder", $(this).attr("title")); });
	$(".user_f").on("click", function(){ $(".info.facode").slideToggle(); });
	$("#username").focus();
});
function checkform(){
	if(!$("#username").val()){ alert("请输入账号"); $("#username").focus(); return false; }
	if(!$("#password").val()){ alert("请输入密码"); $("#password").focus(); return false; }
	if(!$("#code").val()){ alert("请输入验证码"); $("#code").focus(); return false; }
	return true;
}
</script>
</head>
<body>
<div class="bg-shine"></div>
<div class="wrap">
	<div class="main">
		<div class="card">
			<div class="card-title">
				<div class="tit">电脑端登录</div>
				<div class="desc">PC 端会员入口</div>
			</div>
			<form method="post" id="form" name="form" onsubmit="return checkform();">
				<input type="hidden" name="xtype" value="login" />
				<input type="hidden" name="pass" id="pass" value="" />
				<div class="form_t">
					<span class="fl user_t">会员登录</span>
					<span class="fr user_f"></span>
				</div>
				<div class="form-g info username">
					<label>账号</label>
					<input type="text" name="username" id="username" placeholder="请输入您的账号" title="请输入您的账号" autocomplete="off">
				</div>
				<div class="form-g info password">
					<label>密码</label>
					<input type="password" name="password" id="password" placeholder="您的密码" title="您的密码">
				</div>
				<div class="form-g info code code-wrap">
					<div class="form-g" style="flex:1;">
						<label>验证码</label>
						<input type="text" name="code" id="code" placeholder="验证码" title="验证码" autocomplete="off">
					</div>
					<img src="/imgcode.php?act=init" alt="" id="imgcode" title="看不清？点击更换">
				</div>
				<div class="info facode form-g">
					<label>二次验证</label>
					<input type="text" name="facode" placeholder="二次验证码" maxlength="10" autocomplete="off">
				</div>
				<button type="submit" class="btn-login">登 录</button>
			</form>
		</div>
		<div class="side" style="display: none;">
			<div class="qrcode-box">
				<img src="/css/login/qrcode.png" alt="">
				<div class="txt">手机扫码<br>安装客户端</div>
			</div>
		</div>
	</div>
</div>
</body>
</html>
