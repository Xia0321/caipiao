<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" {+if $rkey==0+}oncontextmenu="return false"{+/if+}>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>{+$title+}</title>
<script language="javascript" src="/js/jquery-1.8.3.min.js"></script>
<script language="javascript" src="/js/md5.js"></script>
<link rel="stylesheet" type="text/css" href="../css/default/table.css" />
<script type="text/javascript">
{+if $first==0+}
  alert("您已經超{+$passtime+}天沒有更改密碼，必須更改密碼才能登陸");
{+else+}
  alert("抱歉，为安全起见，你的密码在初次登录或后台重置后，需要新设定。");
{+/if+}
</script>
</head>
<body class="{+$skin+}">
<script type="text/javascript" id="myjs">var mulu='{+$mulu+}';
var js=1;
var sss="changepass";
</script>
<div class="main password">
<table class="table user_info pass_panel input_panel">
<thead><tr><th colspan="2">修改密码</th></tr></thead>
<tbody>
<tr><th>旧密码</th><td><input id="oldpassword" type="password" /></td></tr>
<tr><th>新密码</th><td><input id="password" type="password" /> ＊6-20字符必须由大小写字母和数字组合组成</td></tr>
<tr><th>确认密码</th><td><input id="ckpassword" type="password" /></td></tr>
</tbody>
</table>
<div class="control"><input type="button" class="button qd" value="确定" /> <input type="button" class="button cz" value="重置" /></div>
</div>
</body>
</html>
