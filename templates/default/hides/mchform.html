{+include file='header2.html'+}
<style type="text/css">
.form_mch_wrap { padding: 20px 24px; max-width: 720px; }
.form_mch_wrap .data_table { border-collapse: separate; border-spacing: 0; }
.form_mch_wrap .data_table th,
.form_mch_wrap .data_table td { padding: 14px 16px; vertical-align: middle; font-size: 14px; }
.form_mch_wrap .data_table th { width: 110px; text-align: right; padding-right: 20px; color: #333; font-weight: 600; }
.form_mch_wrap .data_table tr { border-bottom: 1px solid #e8e8e8; }
.form_mch_wrap .data_table tr:last-child { border-bottom: none; }
.form_mch input.text {
    width: 100%;
    max-width: 520px;
    min-width: 280px;
    height: 36px;
    padding: 8px 12px;
    font-size: 14px;
    line-height: 1.4;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
}
.form_mch input.text:focus { border-color: #1554BE; outline: none; }
.form_mch select {
    min-width: 120px;
    height: 36px;
    padding: 6px 10px;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 4px;
}
.form_mch .btn1.s1, .form_mch #btn_gen_secret {
    height: 36px;
    padding: 0 18px;
    font-size: 14px;
    margin-left: 10px;
    vertical-align: middle;
    border-radius: 4px;
}
.form_mch #btn_submit { margin-left: 0; margin-top: 8px; padding: 0 24px; }
.form_mch .red { margin-left: 4px; }
.form_mch .secret_row { display: flex; align-items: center; flex-wrap: nowrap; gap: 10px; max-width: 520px; }
.form_mch .secret_row input.text { flex: 1; min-width: 0; max-width: none; }
.form_mch .secret_row #btn_gen_secret { flex-shrink: 0; margin-left: 0; }
</style>
</head>
<body id="topbody">
<script id=myjs language="javascript">var mulu='{+$mulu+}';var js=1;var sss='mch';</script>
<div class="xbody1">
    <div class="top_info" style="margin-bottom: 16px;">
        <span class="title">{+if $row.id+}编辑商户{+else+}添加商户{+/if+}</span>
        <a href="javascript:void(0);" class="back" onclick="window.location.href=mulu+'mch.php?xtype=show'">返回列表</a>
    </div>
    <div class="form_mch_wrap">
        <form id="mch_form" class="form_mch">
            <input type="hidden" name="id" id="mch_id" value="{+$row.id+}" />
            <input type="hidden" name="xtype" id="xtype" value="{+if $row.id+}update{+else+}save{+/if+}" />
            <table class="data_table wd100">
                <tr>
                    <th>商户编码</th>
                    <td><input type="text" name="mch_code" id="mch_code" class="input text" value="{+$row.mch_code+}" maxlength="64" /> <span class="red">*</span></td>
                </tr>
                <tr>
                    <th>回调地址</th>
                    <td><input type="text" name="callback_url" id="callback_url" class="input text" value="{+$row.callback_url+}" maxlength="512" placeholder="http(s)://..." /></td>
                </tr>
                <tr>
                    <th>回调密钥</th>
                    <td>
                        <div class="secret_row">
                            <input type="text" name="mch_secret" id="mch_secret" class="input text" value="{+$row.mch_secret+}" maxlength="128" placeholder="用于回调签名" />
                            <input type="button" class="btn1 s1" id="btn_gen_secret" value="随机生成" />
                        </div>
                    </td>
                </tr>
                <tr>
                    <th>状态</th>
                    <td>
                        <select name="status" id="status">
                            <option value="1" {+if $row.status==1+}selected="selected"{+/if+}>启用</option>
                            <option value="0" {+if $row.status==0+}selected="selected"{+/if+}>禁用</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <th></th>
                    <td>
                        <input type="button" class="btn1 s1" id="btn_submit" value="{+if $row.id+}保存{+else+}添加{+/if+}" />
                    </td>
                </tr>
            </table>
        </form>
    </div>
</div>
<script type="text/javascript">
function randomSecret(len) {
    var s = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    var r = '';
    for (var i = 0; i < len; i++) {
        r += s.charAt(Math.floor(Math.random() * s.length));
    }
    return r;
}
$(function(){
    $("#btn_gen_secret").click(function(){
        $("#mch_secret").val(randomSecret(32));
    });
    $("#btn_submit").click(function(){
        var mch_code = $.trim($("#mch_code").val());
        if (mch_code === "") {
            alert("请输入商户编码");
            return;
        }
        var xtype = $("#xtype").val();
        var url = mulu + "mch.php?xtype=" + xtype;
        var data = $("#mch_form").serialize();
        $.ajax({
            type: "POST",
            url: url,
            data: data,
            success: function(m){
                if (Number(m) === 1) {
                    alert("操作成功");
                    window.location.href = mulu + "mch.php?xtype=show";
                } else if (Number(m) === 2) {
                    alert("商户编码已存在");
                } else {
                    alert("操作失败");
                }
            }
        });
    });
});
</script>
</body>
</html>
