<div class="contact_type1 mini">
    <div class="contact_info1" style="border-bottom: 1px solid rgb(224, 224, 224);">
        <div class="contact_name1">
            会员名称:
        </div>
        <div class="contact_name1">
            {+$username+}
        </div>
    </div>
    <div class="contact_info1" style="border-bottom: 1px solid rgb(224, 224, 224);">
        <div class="contact_name1">
            会员名称:
        </div>
        <div class="contact_name1" style="color: rgb(0, 0, 0);">
            {+$name+}
        </div>
    </div>
    <div class="contact_info1" style="border-bottom: 1px solid rgb(224, 224, 224);">
        <div class="contact_name1">
            所属盘口:
        </div>
        <div class="contact_name1" style="color: rgb(0, 0, 0);">
            {+$panstr+}盘
        </div>
    </div>
    <div class="contact_info1" style="border-bottom: 1px solid rgb(224, 224, 224);">
        <div class="contact_name1">
            默认盘口:
        </div>
        <div class="contact_name1" style="color: rgb(0, 0, 0);">
            <select id = "abcd" class="abcd">
                    {+foreach item=i from=$span+}<OPTION value="{+$i+}" {+if ($i==$defaultpan)+}selected{+/if+}>{+$i+}盘</OPTION>{+/foreach+}
            </select>&nbsp;&nbsp;<button class="button qd">设置默认盘口</button>
        </div>
    </div>
    <div class="contact_info1" style="border-bottom: 1px solid rgb(224, 224, 224);">
        <div class="contact_name1">
            账户状态:
        </div>
        <div class="contact_name1" style="color: rgb(0, 0, 0);">
            {+$status+}
        </div>
    </div>
{+if $fudong==1+}
    <div class="contact_info1" style="border-bottom: 1px solid rgb(224, 224, 224);">
        <div class="contact_name1">
            额度 :
        </div>
        <div class="contact_name1" style="color: rgb(0, 0, 0);">
            {+$kmaxmoney+} (余额：{+$kmoney+})
        </div>
    </div>
{+else+}
    <div class="contact_info1" style="border-bottom: 1px solid rgb(224, 224, 224);">
        <div class="contact_name1">
            快开彩额度 :
        </div>
        <div class="contact_name1" style="color: rgb(0, 0, 0);">
            {+$kmaxmoney+} (余额：{+$kmoney+})
        </div>
    </div>
    <div class="contact_info1" style="border-bottom: 1px solid rgb(224, 224, 224);">
        <div class="contact_name1">
            低频彩额度 :
        </div>
        <div class="contact_name1" style="color: rgb(0, 0, 0);">
            {+$maxmoney+} (余额：{+$money+})
        </div>
    </div>
{+/if+}
</div>
<div style="padding: 16px 16px 0;">
    <a href="javascript:void(0);" onclick="if(confirm('确定退出登录？')){window.location.href='/mxj/home.php?logout=yes';}" style="display:block;text-align:center;padding:12px 0;background:#e53935;color:#fff;border-radius:8px;font-size:16px;font-weight:600;text-decoration:none;">退出登录</a>
</div>
