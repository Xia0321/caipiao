<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>手机端入口</title>
<style type="text/css">
* { box-sizing: border-box; }
body { margin: 0; padding: 0; min-height: 100vh; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: linear-gradient(165deg, #2d1b4e 0%, #1a0f2e 50%, #0d0818 100%); color: #e8e4f0; -webkit-tap-highlight-color: transparent; }
.bg-dots { position: fixed; inset: 0; background-image: radial-gradient(rgba(180,140,255,.15) 1px, transparent 1px); background-size: 24px 24px; pointer-events: none; z-index: 0; }
.wrap { position: relative; z-index: 1; min-height: 100vh; padding: 40px 20px 24px; display: flex; flex-direction: column; align-items: center; }
.head { text-align: center; margin-bottom: 28px; }
.head .tit { font-size: 20px; font-weight: 600; letter-spacing: 4px; color: #b48cff; text-shadow: 0 0 24px rgba(180,140,255,.35); }
.head .desc { font-size: 12px; color: rgba(232,228,240,.55); margin-top: 6px; }
.card { width: 100%; max-width: 340px; background: rgba(255,255,255,.07); border: 1px solid rgba(180,140,255,.25); border-radius: 20px; padding: 28px 22px; box-shadow: 0 12px 40px rgba(0,0,0,.3); }
.fg { margin-bottom: 16px; }
.fg label { display: block; font-size: 12px; color: rgba(232,228,240,.75); margin-bottom: 5px; }
.fg input[type="text"], .fg input[type="password"] { width: 100%; height: 44px; padding: 0 14px; font-size: 15px; color: #e8e4f0; background: rgba(0,0,0,.25); border: 1px solid rgba(180,140,255,.3); border-radius: 12px; outline: none; }
.fg input::placeholder { color: rgba(232,228,240,.4); }
.fg input:focus { border-color: #b48cff; }
.code-row { display: flex; gap: 10px; align-items: center; }
.code-row .fg { flex: 1; }
.code-row img { height: 44px; border-radius: 12px; cursor: pointer; border: 1px solid rgba(180,140,255,.3); }
.info.facode { display: none; }
.btn-submit { width: 100%; height: 48px; margin-top: 22px; font-size: 16px; font-weight: 600; letter-spacing: 4px; color: #1a0f2e; background: linear-gradient(180deg, #b48cff 0%, #8b5cf6 100%); border: none; border-radius: 12px; cursor: pointer; }
.btn-submit:active { opacity: .9; }
.foot { margin-top: auto; padding-top: 24px; text-align: center; }
.foot a { display: inline-block; padding: 10px 20px; font-size: 12px; color: rgba(232,228,240,.7); text-decoration: none; border: 1px solid rgba(180,140,255,.35); border-radius: 20px; }
.foot a:active { opacity: .85; }
</style>
<script src="/js/jquery-1.8.3.js"></script>
<script src="/js/md5.js"></script>
<script>
$(function(){
	$("#imgcode").on("click", function(){ $(this).attr("src", "/imgcode.php?act=init&" + Math.random()); });
	$("#password").on("blur", function(){ $("#pass").val(men_md5_password($("#password").val())); });
	$("#username").focus();
});
function checkform(){
	if(!$("#username").val()){ alert("请输入账号"); $("#username").focus(); return false; }
	if(!$("#password").val()){ alert("请输入密码"); $("#password").focus(); return false; }
	if(!$("#code").val()){ alert("请输入验证码"); $("#code").focus(); return false; }
	return true;
}
</script>
</head>
<body>
<div class="bg-dots"></div>
<div class="wrap">
	<div class="head">
		<div class="tit">手机端登录</div>
		<div class="desc">移动端会员入口</div>
	</div>
	<div class="card">
		<form method="post" id="form" name="form" onsubmit="return checkform();">
			<input type="hidden" name="xtype" value="login" />
			<input type="hidden" name="pass" id="pass" value="" />
			<div class="fg info username">
				<label>账号</label>
				<input type="text" name="username" id="username" placeholder="用户昵称" title="用户昵称" autocomplete="off">
			</div>
			<div class="fg info password">
				<label>密码</label>
				<input type="password" name="password" id="password" placeholder="您的密码" title="您的密码">
				<a class="showpassword" style="display:none;"></a>
			</div>
			<div class="fg info code code-row">
				<div class="fg" style="flex:1;">
					<label>验证码</label>
					<input type="text" name="code" id="code" placeholder="验证码" autocomplete="off">
				</div>
				<img src="/imgcode.php?act=init" alt="" class="verify-code" id="imgcode" onclick="changeimg()">
			</div>
			<div class="info facode fg">
				<label>二次验证</label>
				<input type="text" name="facode" placeholder="二次验证码" maxlength="10" autocomplete="off">
			</div>
			<button type="submit" class="btn-submit">登 录</button>
		</form>
	</div>
	<div class="foot">
		<a href="/uxj/">桌面电脑端</a>
	</div>
</div>
<script>
function changeimg(){ $("#imgcode").attr("src", "/imgcode.php?act=init&" + Math.random()); }
</script>
</body>
</html>
