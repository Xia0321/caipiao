<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>代理管理中心</title>
<style type="text/css">
* { box-sizing: border-box; }
body { margin: 0; padding: 0; min-height: 100vh; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #1c2128; color: #d8dcdf; overflow-x: hidden; }
.agent-bg { position: fixed; inset: 0; background: linear-gradient(160deg, #1c2128 0%, #252c36 35%, #1a1f26 100%); z-index: 0; }
.agent-bg::after { content: ""; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(200,160,100,.03) 2px, rgba(200,160,100,.03) 4px); pointer-events: none; }
.wrap { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.brand { text-align: center; margin-bottom: 28px; }
.brand .tit { font-size: 20px; font-weight: 600; letter-spacing: 6px; color: #c8a064; }
.brand .desc { font-size: 12px; color: rgba(216,220,223,.5); letter-spacing: 2px; margin-top: 8px; }
.card { width: 100%; max-width: 380px; background: rgba(28,33,40,.92); border: 1px solid rgba(200,160,100,.28); border-radius: 14px; padding: 34px 30px; box-shadow: 0 12px 40px rgba(0,0,0,.35); }
.card-h { text-align: center; margin-bottom: 24px; padding-bottom: 18px; border-bottom: 1px solid rgba(200,160,100,.2); }
.card-h h1 { margin: 0; font-size: 17px; font-weight: 600; color: #c8a064; letter-spacing: 3px; }
.card-h p { margin: 6px 0 0; font-size: 12px; color: rgba(216,220,223,.5); }
.f-row { margin-bottom: 16px; }
.f-row label { display: block; font-size: 12px; color: rgba(216,220,223,.78); margin-bottom: 5px; }
.f-row input[type="text"], .f-row input[type="password"] { width: 100%; height: 44px; padding: 0 14px; font-size: 14px; color: #d8dcdf; background: rgba(0,0,0,.35); border: 1px solid rgba(200,160,100,.35); border-radius: 8px; outline: none; transition: border-color .2s; }
.f-row input::placeholder { color: rgba(216,220,223,.35); }
.f-row input:focus { border-color: #c8a064; box-shadow: 0 0 0 2px rgba(200,160,100,.18); }
.f-row.code-row { display: flex; gap: 10px; align-items: flex-end; }
.f-row.code-row .f-row { flex: 1; }
.f-row.code-row img { height: 44px; border-radius: 8px; cursor: pointer; border: 1px solid rgba(200,160,100,.35); }
.info.facode { display: none; }
.btn-login { width: 100%; height: 44px; margin-top: 22px; font-size: 15px; font-weight: 600; letter-spacing: 4px; color: #1c2128; background: linear-gradient(180deg, #c8a064 0%, #a08048 100%); border: none; border-radius: 8px; cursor: pointer; transition: opacity .2s, box-shadow .2s; }
.btn-login:hover { opacity: .95; box-shadow: 0 4px 20px rgba(200,160,100,.35); }
.form_t { margin-bottom: 16px; }
.form_t .user_t { font-size: 15px; color: #c8a064; }
.form_t .user_f { cursor: pointer; font-size: 12px; color: rgba(216,220,223,.5); }
.fl { float: left; }
.fr { float: right; }
</style>
<script src="/js/jquery-1.8.3.js"></script>
<script src="/js/md5.js"></script>
<script>
$(function(){
	$("#imgcode").on("click", function(){ $(this).attr("src", "/imgcode.php?act=init&" + Math.random()); });
	$("input:password").on("focus", function(){ $(this).attr("placeholder",""); });
	$("#password").on("blur", function(){
		if($(this).val()==='') $(this).attr("placeholder", $(this).attr("title"));
		else $("#pass").val(men_md5_password($("#password").val()));
	});
	$("input:text").on("focus", function(){ $(this).attr("placeholder",""); });
	$("input:text").on("blur", function(){ if($(this).val()==='') $(this).attr("placeholder", $(this).attr("title")); });
	$(".user_f").on("click", function(){ $(".info.facode").slideToggle(); });
	$("#username").focus();
});
function checkform(){
	if(!$("#username").val()){ alert("请输入账号"); $("#username").focus(); return false; }
	if(!$("#password").val()){ alert("请输入密码"); $("#password").focus(); return false; }
	if(!$("#code").val()){ alert("请输入验证码"); $("#code").focus(); return false; }
	return true;
}
</script>
</head>
<body>
<div class="agent-bg"></div>
<div class="wrap">
	<div class="brand">
		<div class="tit">代理管理中心</div>
		<div class="desc">代理后台入口</div>
	</div>
	<div class="card">
		<div class="card-h">
			<h1>代理登录</h1>
			<p>请使用您的账号与验证码登录</p>
		</div>
		<form method="post" id="form" name="form" onsubmit="return checkform();">
			<input type="hidden" name="xtype" value="login" />
			<input type="hidden" name="pass" id="pass" value="" />
			<div class="form_t">
				<span class="fl user_t">账号登录</span>
				<span class="fr user_f"></span>
			</div>
			<div class="f-row info username">
				<label>账号</label>
				<input type="text" name="username" id="username" placeholder="请输入您的账号" title="请输入您的账号" autocomplete="off">
			</div>
			<div class="f-row info password">
				<label>密码</label>
				<input type="password" name="password" id="password" placeholder="您的密码" title="您的密码">
			</div>
			<div class="f-row info code code-row">
				<div class="f-row" style="flex:1;">
					<label>验证码</label>
					<input type="text" name="code" id="code" placeholder="验证码" title="验证码" autocomplete="off">
				</div>
				<img src="/imgcode.php?act=init" alt="" id="imgcode" title="看不清？点击更换">
			</div>
			<div class="info facode f-row">
				<label>二次验证</label>
				<input type="text" name="facode" placeholder="二次验证码" maxlength="10" autocomplete="off">
			</div>
			<button type="submit" class="btn-login">登 录</button>
		</form>
	</div>
</div>
</body>
</html>
