<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>代理管理中心</title>
<style type="text/css">
* { box-sizing: border-box; }
body { margin: 0; padding: 0; min-height: 100vh; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #1c2128; color: #d8dcdf; -webkit-tap-highlight-color: transparent; }
.agent-bg { position: fixed; inset: 0; background: linear-gradient(165deg, #1c2128 0%, #252c36 50%, #1a1f26 100%); z-index: 0; }
.wrap { position: relative; z-index: 1; min-height: 100vh; padding: 36px 20px 24px; display: flex; flex-direction: column; align-items: center; }
.head { text-align: center; margin-bottom: 24px; }
.head .tit { font-size: 18px; font-weight: 600; letter-spacing: 4px; color: #c8a064; }
.head .desc { font-size: 12px; color: rgba(216,220,223,.55); margin-top: 6px; }
.card { width: 100%; max-width: 340px; background: rgba(28,33,40,.95); border: 1px solid rgba(200,160,100,.28); border-radius: 16px; padding: 24px 20px; box-shadow: 0 12px 40px rgba(0,0,0,.3); }
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 12px; color: rgba(216,220,223,.8); margin-bottom: 5px; }
.fg input[type="text"], .fg input[type="password"] { width: 100%; height: 44px; padding: 0 14px; font-size: 15px; color: #d8dcdf; background: rgba(0,0,0,.3); border: 1px solid rgba(200,160,100,.35); border-radius: 10px; outline: none; }
.fg input:focus { border-color: #c8a064; }
.code-row { display: flex; gap: 10px; align-items: center; }
.code-row .fg { flex: 1; }
.code-row img { height: 44px; border-radius: 10px; cursor: pointer; border: 1px solid rgba(200,160,100,.35); }
.info.facode { display: none; }
.btn-login { width: 100%; height: 48px; margin-top: 20px; font-size: 16px; font-weight: 600; letter-spacing: 4px; color: #1c2128; background: linear-gradient(180deg, #c8a064 0%, #a08048 100%); border: none; border-radius: 10px; cursor: pointer; }
.btn-login:active { opacity: .9; }
.foot { margin-top: auto; padding-top: 20px; text-align: center; }
.foot a { font-size: 12px; color: rgba(216,220,223,.65); text-decoration: none; }
</style>
<script src="/js/jquery-1.8.3.js"></script>
<script src="/js/md5.js"></script>
<script>
$(function(){
	if(top.location.href!=window.location.href) top.location.href=window.location.href;
	$("#imgcode").on("click", function(){ $(this).attr("src", "/imgcode.php?act=init&" + Math.random()); });
	$("#password").on("blur", function(){ $("#pass").val(men_md5_password($("#password").val())); });
	$("#username").focus();
});
function changeimg(){ $("#imgcode").attr("src", "/imgcode.php?act=init&" + Math.random()); }
function checkform(){
	if(!$("#username").val()){ alert("请输入账号"); $("#username").focus(); return false; }
	if(!$("#password").val()){ alert("请输入密码"); $("#password").focus(); return false; }
	if(!$("#code").val()){ alert("请输入验证码"); $("#code").focus(); return false; }
	return true;
}
</script>
</head>
<body>
<div class="agent-bg"></div>
<div class="wrap">
	<div class="head">
		<div class="tit">代理管理中心</div>
		<div class="desc">代理后台入口</div>
	</div>
	<div class="card">
		<form method="post" id="form" name="form" onsubmit="return checkform();">
			<input type="hidden" name="xtype" value="login" />
			<input type="hidden" name="pass" id="pass" value="" />
			<div class="fg info username">
				<label>账号</label>
				<input type="text" name="username" id="username" placeholder="用户昵称" title="用户昵称" autocomplete="off">
			</div>
			<div class="fg info password">
				<label>密码</label>
				<input type="password" name="password" id="password" placeholder="您的密码" title="您的密码">
			</div>
			<div class="fg info code code-row">
				<div class="fg" style="flex:1;">
					<label>验证码</label>
					<input type="text" name="code" id="code" placeholder="验证码" autocomplete="off">
				</div>
				<img src="/imgcode.php?act=init" alt="" class="verify-code" id="imgcode" onclick="changeimg()">
			</div>
			<div class="info facode fg">
				<label>二次验证</label>
				<input type="text" name="facode" placeholder="二次验证码" maxlength="10" autocomplete="off">
			</div>
			<button type="submit" class="btn-login">登 录</button>
		</form>
	</div>
	<div class="foot"><a href="/agent/">桌面版</a></div>
</div>
</body>
</html>
